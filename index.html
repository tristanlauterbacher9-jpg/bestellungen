<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f0f0f">
    <title>Bestellungen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        :root {
            --bg: #0a0a0f;
            --card: #141420;
            --card-hover: #1a1a2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.25);
            --text: #eaeaea;
            --text-muted: #6b6b80;
            --border: #1e1e30;
            --danger: #ff4757;
            --success: #00d68f;
            --cat-fumot: #ff6b6b;
            --cat-uzy: #ffa502;
            --cat-bang: #1dd1a1;
            --radius: 14px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            background: linear-gradient(180deg, var(--card) 0%, var(--bg) 100%);
            padding: 20px 20px 14px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px 16px;
        }

        /* Suchleiste */
        .search-bar {
            margin-bottom: 14px;
            position: relative;
        }

        .search-bar svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-bar input {
            width: 100%;
            padding: 13px 14px 13px 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Export */
        .export-section {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .export-section .btn-small {
            flex: 1;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 10px;
            background: var(--card);
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
        }

        .export-section .btn-small:active {
            transform: scale(0.96);
            background: var(--card-hover);
        }

        /* Einträge Header */
        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entries-header h2 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .entry-count {
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* Entry Cards */
        .entry-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: transform 0.1s;
        }

        .entry-card:active {
            transform: scale(0.985);
        }

        .entry-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .entry-name {
            font-size: 1rem;
            font-weight: 600;
        }

        .entry-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .entry-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--success);
        }

        .entry-product {
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 6px 0;
        }

        .entry-product strong {
            color: var(--text);
            font-weight: 500;
        }

        .entry-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .entry-actions .btn-action {
            flex: 1;
            padding: 9px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .entry-actions .btn-action:active {
            transform: scale(0.95);
        }

        .btn-edit {
            background: var(--border);
            color: var(--text);
        }

        .btn-delete {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            right: 20px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 24px var(--accent-glow);
            transition: transform 0.15s;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .fab:active {
            transform: scale(0.88);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            max-height: 92dvh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-overflow-scrolling: touch;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 14px;
        }

        .modal h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 18px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Produkt Picker */
        .product-display {
            width: 100%;
            min-height: 48px;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .product-display.has-value {
            border-color: var(--accent);
        }

        .product-display .placeholder {
            color: var(--text-muted);
        }

        .product-display .cat-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* Kategorien */
        .cat-section {
            margin-top: 12px;
        }

        .cat-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 4px;
        }

        .cat-btn {
            padding: 14px 8px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.3;
        }

        .cat-btn:active {
            transform: scale(0.95);
        }

        .cat-btn .cat-count {
            display: block;
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .cat-btn.active-fumot {
            border-color: var(--cat-fumot);
            background: rgba(255, 107, 107, 0.1);
            color: var(--cat-fumot);
        }

        .cat-btn.active-uzy {
            border-color: var(--cat-uzy);
            background: rgba(255, 165, 2, 0.1);
            color: var(--cat-uzy);
        }

        .cat-btn.active-bang {
            border-color: var(--cat-bang);
            background: rgba(29, 209, 161, 0.1);
            color: var(--cat-bang);
        }

        /* Geschmack Grid */
        .flavor-section {
            display: none;
            margin-top: 10px;
            animation: fadeIn 0.2s ease;
        }

        .flavor-section.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .flavor-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .flavor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .flavor-btn {
            padding: 11px 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            line-height: 1.2;
        }

        .flavor-btn:active {
            transform: scale(0.95);
        }

        .flavor-btn.selected {
            border-color: var(--accent);
            background: var(--accent-glow);
            color: #fff;
            font-weight: 600;
        }

        /* Custom Kalender */
        .date-display {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .date-display.open {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .date-display svg {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .calendar {
            display: none;
            margin-top: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            animation: fadeIn 0.2s ease;
        }

        .calendar.open {
            display: block;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .cal-header .cal-title {
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            flex: 1;
        }

        .cal-nav {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .cal-nav:active {
            transform: scale(0.9);
            background: var(--accent-glow);
        }

        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 6px;
        }

        .cal-weekdays span {
            text-align: center;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 4px 0;
        }

        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cal-day {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
            position: relative;
        }

        .cal-day:active {
            transform: scale(0.88);
        }

        .cal-day.empty {
            pointer-events: none;
        }

        .cal-day.today {
            color: var(--accent);
            font-weight: 700;
        }

        .cal-day.today::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
        }

        .cal-day.selected {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            font-weight: 700;
        }

        .cal-day.selected::after {
            display: none;
        }

        .cal-day.other-month {
            color: var(--text-muted);
            opacity: 0.35;
        }

        .cal-today-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .cal-today-btn:active {
            transform: scale(0.97);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-cancel {
            background: var(--bg);
            color: var(--text-muted);
            margin-top: 8px;
            border: 1px solid var(--border);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(90px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            color: var(--text);
            padding: 12px 22px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 300;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<header>
    <h1>Bestellungen</h1>
</header>

<div class="container">
    <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Name oder Produkt suchen...">
    </div>

    <div class="export-section">
        <button class="btn-small" onclick="exportCSV()">CSV Export</button>
        <button class="btn-small" onclick="exportJSON()">JSON Export</button>
    </div>

    <div class="entries-header">
        <h2>Bestellungen</h2>
        <span class="entry-count" id="entryCount">0</span>
    </div>

    <div id="entriesList"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2 id="modalTitle">Neue Bestellung</h2>

        <div class="form-group">
            <label>Kundenname</label>
            <input type="text" id="inputName" placeholder="Name eingeben" autocomplete="name">
        </div>

        <div class="form-group">
            <label>Datum</label>
            <div class="date-display" id="dateDisplay" onclick="toggleCalendar()">
                <span id="dateText">Heute</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div class="calendar" id="calendar">
                <div class="cal-header">
                    <button type="button" class="cal-nav" onclick="calNav(-1)">‹</button>
                    <div class="cal-title" id="calTitle"></div>
                    <button type="button" class="cal-nav" onclick="calNav(1)">›</button>
                </div>
                <div class="cal-weekdays">
                    <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
                </div>
                <div class="cal-days" id="calDays"></div>
                <button type="button" class="cal-today-btn" onclick="calToday()">Heute</button>
            </div>
            <input type="hidden" id="inputDate">
        </div>

        <div class="form-group">
            <label>Produkt</label>
            <div class="product-display" id="productDisplay">
                <span class="placeholder">Kategorie &amp; Geschmack wählen</span>
            </div>

            <div class="cat-section">
                <div class="cat-buttons" id="catButtons"></div>

                <div class="flavor-section" id="flavorSection">
                    <div class="flavor-label" id="flavorLabel"></div>
                    <div class="flavor-grid" id="flavorGrid"></div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Preis</label>
            <input type="number" id="inputPrice" placeholder="0,00 €" step="0.01" min="0" inputmode="decimal">
        </div>

        <button class="btn btn-primary" id="btnSave" onclick="saveEntry()">Speichern</button>
        <button class="btn btn-cancel" onclick="closeModal()">Abbrechen</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let entries = [];
    let editIndex = -1;
    const API = '/api/entries';

    const catalog = {
        'Fumot 15k': {
            color: 'fumot',
            flavors: ['Triple Berry', 'Mr Blue', 'Blueberry Razz Lemonade', 'Cola Ice', 'Mixed Berry']
        },
        'Uzy Crystal King 50K': {
            color: 'uzy',
            flavors: [
                'Blueberry On Ice', 'Summer Peach Ice', 'Kiwi Passion Fruit Guava',
                'Blueberry Raspberry', 'Strawberry Kiwi', 'Grape Ice', 'Two Apple',
                'Strawberry Watermelon', 'Lemon Lime', 'Cherry Ice',
                'Strawberry Raspberry Cherry', 'Mr Blue', 'Peach Mango Pineapple',
                'Red Bull', 'Watermelon Ice', 'Mixed Berries', 'Strawberry Banana', 'Love66'
            ]
        },
        'Bangking 30000': {
            color: 'bang',
            flavors: [
                'Watermelon Ice', 'Strawberry And Mango', 'Strawberry And Watermelon',
                'Kiwi Passion Fruit Guava', 'Grape Ice', 'Blueberry Raspberry',
                'Peach Mango Watermelon', 'Mixed Mouldy Fruit', 'Blueberry Ice',
                'Black Dragon Ice', 'Strawberry And Banana', 'Red Bull',
                'Blueberry Watermelon', 'Strawberry Kiwi', 'Peach Ice', 'Sour Apple Raspberry'
            ]
        }
    };

    let activeCat = '';
    let activeFlavor = '';

    async function loadEntries() {
        try {
            const res = await fetch(API);
            entries = await res.json();
            renderEntries();
        } catch (e) {
            // Fallback localStorage
            entries = JSON.parse(localStorage.getItem('entries') || '[]');
            renderEntries();
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Kategorie Buttons rendern
    function renderCatButtons() {
        const container = document.getElementById('catButtons');
        container.innerHTML = Object.entries(catalog).map(([name, data]) => {
            const isActive = activeCat === name;
            const cls = isActive ? ` active-${data.color}` : '';
            return `<button type="button" class="cat-btn${cls}" onclick="pickCategory('${name}')">
                ${name}<span class="cat-count">${data.flavors.length} Sorten</span>
            </button>`;
        }).join('');
    }

    function pickCategory(cat) {
        const section = document.getElementById('flavorSection');

        if (activeCat === cat) {
            activeCat = '';
            activeFlavor = '';
            section.classList.remove('visible');
            updateProductDisplay();
            renderCatButtons();
            return;
        }

        activeCat = cat;
        activeFlavor = '';
        renderCatButtons();

        const data = catalog[cat];
        document.getElementById('flavorLabel').textContent = cat + ' — Geschmack:';
        document.getElementById('flavorGrid').innerHTML = data.flavors.map(f =>
            `<button type="button" class="flavor-btn" onclick="pickFlavor('${f.replace(/'/g, "\\'")}')">${f}</button>`
        ).join('');

        section.classList.add('visible');
        updateProductDisplay();
    }

    function pickFlavor(flavor) {
        activeFlavor = flavor;
        document.querySelectorAll('.flavor-btn').forEach(b => {
            b.classList.toggle('selected', b.textContent === flavor);
        });
        updateProductDisplay();
    }

    function updateProductDisplay() {
        const display = document.getElementById('productDisplay');
        if (!activeCat) {
            display.innerHTML = '<span class="placeholder">Kategorie &amp; Geschmack wählen</span>';
            display.classList.remove('has-value');
            return;
        }

        const color = catalog[activeCat].color;
        const colors = { fumot: 'var(--cat-fumot)', uzy: 'var(--cat-uzy)', bang: 'var(--cat-bang)' };

        let html = `<span class="cat-badge" style="background:${colors[color]}; color:#000">${activeCat}</span>`;
        if (activeFlavor) {
            html += `<span>${activeFlavor}</span>`;
        } else {
            html += '<span class="placeholder">Geschmack wählen...</span>';
        }
        display.innerHTML = html;
        display.classList.toggle('has-value', !!activeFlavor);
    }

    function getProductValue() {
        if (activeCat && activeFlavor) return activeCat + ' - ' + activeFlavor;
        if (activeCat) return activeCat;
        return '';
    }

    // Modal
    function openModal(index) {
        editIndex = index !== undefined ? index : -1;
        const title = document.getElementById('modalTitle');
        const btn = document.getElementById('btnSave');

        activeCat = '';
        activeFlavor = '';

        // Kalender schliessen
        document.getElementById('calendar').classList.remove('open');
        document.getElementById('dateDisplay').classList.remove('open');

        if (editIndex >= 0) {
            const e = entries[editIndex];
            document.getElementById('inputName').value = e.name;
            document.getElementById('inputPrice').value = e.price;
            initCalendar(e.date);
            title.textContent = 'Bestellung bearbeiten';
            btn.textContent = 'Aktualisieren';

            // Produkt parsen
            if (e.product && e.product.includes(' - ')) {
                const [cat, flav] = e.product.split(' - ');
                if (catalog[cat]) {
                    activeCat = cat;
                    activeFlavor = flav;
                }
            }
        } else {
            document.getElementById('inputName').value = '';
            document.getElementById('inputPrice').value = '';
            initCalendar();
            title.textContent = 'Neue Bestellung';
            btn.textContent = 'Speichern';
        }

        renderCatButtons();

        if (activeCat) {
            pickCategory(activeCat);
            if (activeFlavor) pickFlavor(activeFlavor);
        } else {
            document.getElementById('flavorSection').classList.remove('visible');
            updateProductDisplay();
        }

        document.getElementById('modalOverlay').classList.add('active');
        setTimeout(() => document.getElementById('inputName').focus(), 300);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        editIndex = -1;
    }

    function handleOverlayClick(e) {
        if (e.target === e.currentTarget) closeModal();
    }

    async function saveEntry() {
        const name = document.getElementById('inputName').value.trim();
        const date = document.getElementById('inputDate').value;
        const product = getProductValue();
        const price = document.getElementById('inputPrice').value;

        if (!name) { showToast('Bitte Name eingeben'); return; }
        if (!product || !activeFlavor) { showToast('Bitte Produkt & Geschmack wählen'); return; }

        const entry = {
            name,
            date,
            product,
            price: parseFloat(price) || 0
        };

        try {
            if (editIndex >= 0) {
                const id = entries[editIndex].id;
                await fetch(API + '/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entry)
                });
                showToast('Bestellung aktualisiert');
            } else {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entry)
                });
                showToast('Bestellung gespeichert');
            }
            await loadEntries();
        } catch (e) {
            showToast('Fehler beim Speichern');
        }

        closeModal();
    }

    async function deleteEntry(index) {
        if (confirm('Bestellung wirklich löschen?')) {
            try {
                await fetch(API + '/' + entries[index].id, { method: 'DELETE' });
                showToast('Gelöscht');
                await loadEntries();
            } catch (e) {
                showToast('Fehler beim Löschen');
            }
        }
    }

    function formatDate(d) {
        if (!d) return '-';
        const [y, m, day] = d.split('-');
        return `${day}.${m}.${y}`;
    }

    function formatPrice(p) {
        return p.toFixed(2).replace('.', ',') + ' €';
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }

    function renderEntries() {
        const list = document.getElementById('entriesList');
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = entries.filter(e =>
            e.name.toLowerCase().includes(q) || e.product.toLowerCase().includes(q)
        );

        document.getElementById('entryCount').textContent = filtered.length;

        if (!filtered.length) {
            list.innerHTML = `<div class="empty-state">
                <div class="icon">📦</div>
                <p>${q ? 'Keine Ergebnisse' : 'Noch keine Bestellungen'}</p>
            </div>`;
            return;
        }

        list.innerHTML = filtered.map(e => {
            const idx = entries.indexOf(e);
            // Farbcodierung
            let badgeColor = 'var(--accent)';
            let catName = '';
            let flavorName = esc(e.product);
            if (e.product.includes(' - ')) {
                const parts = e.product.split(' - ');
                catName = parts[0];
                flavorName = esc(parts[1]);
                if (catalog[catName]) badgeColor = `var(--cat-${catalog[catName].color})`;
            }

            return `<div class="entry-card">
                <div class="entry-top">
                    <div>
                        <div class="entry-name">${esc(e.name)}</div>
                        <div class="entry-date">${formatDate(e.date)}</div>
                    </div>
                    <div class="entry-price">${formatPrice(e.price)}</div>
                </div>
                <div class="entry-product">
                    ${catName ? `<span class="cat-badge" style="background:${badgeColor};color:#000;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:5px;margin-right:6px">${esc(catName)}</span>` : ''}
                    <strong>${flavorName}</strong>
                </div>
                <div class="entry-actions">
                    <button class="btn-action btn-edit" onclick="openModal(${idx})">Bearbeiten</button>
                    <button class="btn-action btn-delete" onclick="deleteEntry(${idx})">Löschen</button>
                </div>
            </div>`;
        }).join('');
    }

    function exportCSV() {
        if (!entries.length) { showToast('Keine Daten'); return; }
        let csv = 'Name,Datum,Produkt,Preis\n';
        csv += entries.map(e =>
            `"${e.name}","${formatDate(e.date)}","${e.product}","${formatPrice(e.price)}"`
        ).join('\n');
        download(csv, 'bestellungen.csv', 'text/csv');
        showToast('CSV exportiert');
    }

    function exportJSON() {
        if (!entries.length) { showToast('Keine Daten'); return; }
        download(JSON.stringify(entries, null, 2), 'bestellungen.json', 'application/json');
        showToast('JSON exportiert');
    }

    function download(content, filename, type) {
        const blob = new Blob([content], { type });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // === Custom Kalender ===
    const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    let calYear, calMonth, selectedDate;

    function initCalendar(dateStr) {
        const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
        selectedDate = new Date(d);
        calYear = d.getFullYear();
        calMonth = d.getMonth();
        syncDateInput();
        renderCalendar();
    }

    function syncDateInput() {
        const y = selectedDate.getFullYear();
        const m = String(selectedDate.getMonth() + 1).padStart(2, '0');
        const d = String(selectedDate.getDate()).padStart(2, '0');
        document.getElementById('inputDate').value = `${y}-${m}-${d}`;

        const today = new Date();
        const isToday = selectedDate.toDateString() === today.toDateString();
        const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
        const isYesterday = selectedDate.toDateString() === yesterday.toDateString();

        let text;
        if (isToday) text = 'Heute';
        else if (isYesterday) text = 'Gestern';
        else text = `${d}.${m}.${y}`;

        document.getElementById('dateText').textContent = text;
    }

    function toggleCalendar() {
        const cal = document.getElementById('calendar');
        const display = document.getElementById('dateDisplay');
        const isOpen = cal.classList.toggle('open');
        display.classList.toggle('open', isOpen);
        if (isOpen) renderCalendar();
    }

    function calNav(dir) {
        calMonth += dir;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar();
    }

    function calToday() {
        selectedDate = new Date();
        calYear = selectedDate.getFullYear();
        calMonth = selectedDate.getMonth();
        syncDateInput();
        renderCalendar();
        document.getElementById('calendar').classList.remove('open');
        document.getElementById('dateDisplay').classList.remove('open');
    }

    function calPickDay(y, m, d) {
        selectedDate = new Date(y, m, d);
        calYear = y;
        calMonth = m;
        syncDateInput();
        renderCalendar();
        setTimeout(() => {
            document.getElementById('calendar').classList.remove('open');
            document.getElementById('dateDisplay').classList.remove('open');
        }, 150);
    }

    function renderCalendar() {
        document.getElementById('calTitle').textContent = `${monthNames[calMonth]} ${calYear}`;

        const container = document.getElementById('calDays');
        const today = new Date();
        const selStr = selectedDate.toDateString();

        // Erster Tag des Monats (Mo=0 Startoffset)
        let firstDay = new Date(calYear, calMonth, 1).getDay();
        firstDay = (firstDay === 0) ? 6 : firstDay - 1; // Mo-basiert

        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const daysInPrev = new Date(calYear, calMonth, 0).getDate();

        let html = '';

        // Vormonat-Tage
        for (let i = firstDay - 1; i >= 0; i--) {
            const day = daysInPrev - i;
            const pm = calMonth === 0 ? 11 : calMonth - 1;
            const py = calMonth === 0 ? calYear - 1 : calYear;
            const isSelected = new Date(py, pm, day).toDateString() === selStr;
            html += `<button type="button" class="cal-day other-month${isSelected ? ' selected' : ''}" onclick="calPickDay(${py},${pm},${day})">${day}</button>`;
        }

        // Aktueller Monat
        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(calYear, calMonth, d);
            const isToday = date.toDateString() === today.toDateString();
            const isSelected = date.toDateString() === selStr;
            let cls = 'cal-day';
            if (isToday) cls += ' today';
            if (isSelected) cls += ' selected';
            html += `<button type="button" class="${cls}" onclick="calPickDay(${calYear},${calMonth},${d})">${d}</button>`;
        }

        // Nächster Monat auffüllen (bis 42 Zellen = 6 Wochen)
        const totalCells = firstDay + daysInMonth;
        const remaining = (totalCells % 7 === 0) ? 0 : 7 - (totalCells % 7);
        for (let d = 1; d <= remaining; d++) {
            const nm = calMonth === 11 ? 0 : calMonth + 1;
            const ny = calMonth === 11 ? calYear + 1 : calYear;
            const isSelected = new Date(ny, nm, d).toDateString() === selStr;
            html += `<button type="button" class="cal-day other-month${isSelected ? ' selected' : ''}" onclick="calPickDay(${ny},${nm},${d})">${d}</button>`;
        }

        container.innerHTML = html;
    }

    document.getElementById('searchInput').addEventListener('input', renderEntries);
    renderCatButtons();
    loadEntries();
</script>

</body>
